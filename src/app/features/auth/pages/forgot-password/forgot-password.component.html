<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <h1>Esqueceu a senha?</h1>
      <p class="login-subtitle">
        Informe seu e-mail e enviaremos um link para redefinir sua senha.
      </p>
    </div>

    <form class="login-form">
      <div class="field">
        <label for="email">E-mail</label>

        <span class="p-input-icon-left w-100">
          <i class="pi pi-envelope"></i>
          <input
            id="email"
            pInputText
            type="email"
            class="form-control w-100"
            placeholder="Digite seu e-mail"
            name="email"
            required
          />
        </span>

        <!-- Mensagens (layout) - sem validação por enquanto -->
        <div class="fake-message">Informe seu e-mail</div>
        <div class="fake-message">Informe um e-mail válido</div>
      </div>

      <!-- Caixa informativa (layout) -->
      <div class="info-box">
        Se este e-mail estiver cadastrado, você receberá um link para redefinir sua senha.
      </div>

      <button type="button" class="btn btn-primary login-form-button">
        Enviar link
      </button>

      <button type="button" class="btn btn-outline-danger cancel-button">
        Cancelar
      </button>
    </form>
  </div>
</div>
