<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <h1>Redefinir senha</h1>
      <p class="login-subtitle">
        Digite sua nova senha para concluir a redefinição.
      </p>
    </div>

    <form class="login-form">
      <div class="field">
        <label for="password">Nova senha</label>

        <span class="p-input-icon-left w-100">
          <i class="pi pi-lock"></i>
          <input
            id="password"
            pInputText
            type="password"
            class="form-control w-100"
            placeholder="Digite sua nova senha"
            name="password"
            required
          />
        </span>

        <div class="fake-message">Informe uma senha válida</div>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirmar senha</label>

        <span class="p-input-icon-left w-100">
          <i class="pi pi-lock"></i>
          <input
            id="confirmPassword"
            pInputText
            type="password"
            class="form-control w-100"
            placeholder="Confirme sua senha"
            name="confirmPassword"
            required
          />
        </span>

        <div class="fake-message">As senhas devem coincidir</div>
      </div>

      <div class="info-box">
        Verifique se você acessou esta página pelo link enviado ao seu e-mail.
      </div>

      <button type="button" class="btn btn-primary login-form-button">
        Confirmar nova senha
      </button>

      <button type="button" class="btn btn-outline-danger cancel-button">
        Cancelar
      </button>
    </form>
  </div>
</div>
