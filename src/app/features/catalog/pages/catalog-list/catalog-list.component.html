<div class="catalog-filter-container">
  <app-catalog-filter (search)="searchCatalog($event)"></app-catalog-filter>
</div>

<div class="catalog-grid" *ngIf="items.length > 0; else emptyCatalog">
  <app-catalog-item-card
    *ngFor="let item of items"
    [item]="item"
    [imageUrl]="imageMap[item.id!]"
    (details)="openDetails($event)"
  ></app-catalog-item-card>
</div>

<ng-template #emptyCatalog>
  <div class="catalog-empty">
    <i class="pi pi-box"></i>
    <span>Nenhum item encontrado.</span>
  </div>
</ng-template>

<div class="catalog-paginator">
  <p-paginator
    [rows]="pagination.linesPerPage"
    [first]="pagination.page * pagination.linesPerPage"
    [totalRecords]="totalElements"
    (onPageChange)="changePage($event)"
  ></p-paginator>
</div>
