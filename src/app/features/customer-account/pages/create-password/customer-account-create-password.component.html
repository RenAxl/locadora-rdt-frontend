<div class="account-page">
  <div class="account-card">
    <div class="account-header"><h1>Criar senha</h1><p>Defina a senha de acesso à sua conta.</p></div>
    <form #passwordForm="ngForm" (ngSubmit)="createPassword(passwordForm)">
      <div class="field"><label>Nova senha</label><input pInputText type="password" name="password" [(ngModel)]="password" required minlength="6" /></div>
      <div class="field"><label>Confirmar nova senha</label><input pInputText type="password" name="passwordConfirmation" [(ngModel)]="passwordConfirmation" #confirmation="ngModel" required minlength="6" /></div>
      <small class="field-error" *ngIf="confirmation.errors?.['mismatch']">As senhas não conferem.</small>
      <div class="field-error" *ngIf="!token">Token não encontrado. Solicite um novo link.</div>
      <button type="submit" class="btn btn-primary action-button" [disabled]="passwordForm.invalid || loading || !token">{{ loading ? 'SALVANDO...' : 'Criar senha' }}</button>
      <a class="back-link" routerLink="/customer-account/resend">Solicitar novo link</a>
    </form>
  </div>
</div>
