<div class="payment-frequency-filter-container">
  <div class="payment-frequency-actions-group">
    <a routerLink="/payment-frequencies/create" class="action-link">
      <button class="btn btn-primary text-white btn-crud-action" type="button">
        NOVA FREQUÊNCIA
      </button>
    </a>

    <button
      *ngIf="selectedPaymentFrequencyIds.length > 0"
      class="btn btn-danger text-white btn-crud-action"
      type="button"
      (click)="deleteSelectedPaymentFrequencies()"
    >
      EXCLUIR FREQUÊNCIAS
    </button>
  </div>

  <app-name-filter
    text="Digite a frequência de pagamento"
    (search)="searchPaymentFrequency($event)"
  ></app-name-filter>
</div>

<div class="payment-frequency-card">
  <div class="grid">
    <div class="col-12">
      <p-table
        [value]="paymentFrequencies"
        dataKey="id"
        (onRowSelect)="onRowSelect($event)"
        (onRowUnselect)="onRowUnselect($event)"
        responsiveLayout="stack"
        breakpoint="991px"
        [paginator]="true"
        [rows]="pagination.linesPerPage"
        [lazy]="true"
        [totalRecords]="totalElements"
        (onLazyLoad)="changePage($event)"
        #paymentFrequencyTable
      >
        <ng-template pTemplate="header">
          <tr>
            <th></th>
            <th>Frequência</th>
            <th>Dias</th>
            <th class="actions"></th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-paymentFrequency>
          <tr>
            <td>
              <p-tableCheckbox [value]="paymentFrequency"></p-tableCheckbox>
            </td>

            <td class="columns">
              <span class="p-column-title">Frequência:</span>
              {{ paymentFrequency.frequency }}
            </td>

            <td class="columns">
              <span class="p-column-title">Dias:</span>
              {{
                paymentFrequency.days != null ? paymentFrequency.days : "-"
              }}
            </td>

            <td class="col-actions">
              <div class="actions-wrap">
                <a
                  pButton
                  class="p-button-rounded p-button-text"
                  icon="pi pi-pencil"
                  pTooltip="Atualizar frequência de pagamento"
                  tooltipPosition="top"
                  [routerLink]="[
                    '/payment-frequencies/',
                    paymentFrequency.id,
                    'edit'
                  ]"
                ></a>

                <button
                  pButton
                  class="p-button-rounded p-button-text p-button-danger"
                  icon="pi pi-trash"
                  pTooltip="Excluir frequência de pagamento"
                  tooltipPosition="top"
                  (click)="delete(paymentFrequency)"
                ></button>

                <button
                  pButton
                  class="p-button-rounded p-button-text"
                  icon="pi pi-eye"
                  pTooltip="Detalhamento da frequência de pagamento"
                  tooltipPosition="top"
                  (click)="openDetails(paymentFrequency)"
                ></button>
              </div>
            </td>
          </tr>
        </ng-template>
      </p-table>

      <app-payment-frequency-details-modal
        [visible]="detailsVisible"
        (visibleChange)="detailsVisible = $event"
        [title]="'Detalhamento da Frequência de Pagamento'"
        [paymentFrequency]="paymentFrequencyDetails"
      ></app-payment-frequency-details-modal>
    </div>
  </div>
</div>
