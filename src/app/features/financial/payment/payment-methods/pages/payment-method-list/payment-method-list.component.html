<div class="payment-method-filter-container">
  <div class="payment-method-actions-group">
    <a routerLink="/payment-methods/create" class="action-link">
      <button class="btn btn-primary text-white btn-crud-action" type="button">
        NOVA FORMA DE PAGAMENTO
      </button>
    </a>

    <button
      *ngIf="selectedPaymentMethodIds.length > 0"
      class="btn btn-danger text-white btn-crud-action"
      type="button"
      (click)="deleteSelectedPaymentMethods()"
    >
      EXCLUIR FORMAS
    </button>
  </div>

  <app-name-filter
    text="Digite o nome da forma de pagamento"
    (search)="searchPaymentMethod($event)"
  ></app-name-filter>
</div>

<div class="payment-method-card">
  <div class="grid">
    <div class="col-12">
      <p-table
        [value]="paymentMethods"
        dataKey="id"
        (onRowSelect)="onRowSelect($event)"
        (onRowUnselect)="onRowUnselect($event)"
        responsiveLayout="stack"
        breakpoint="991px"
        [paginator]="true"
        [rows]="pagination.linesPerPage"
        [lazy]="true"
        [totalRecords]="totalElements"
        (onLazyLoad)="changePage($event)"
        #paymentMethodTable
      >
        <ng-template pTemplate="header">
          <tr>
            <th></th>
            <th>Nome</th>
            <th>Taxa</th>
            <th class="actions"></th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-paymentMethod>
          <tr>
            <td>
              <p-tableCheckbox [value]="paymentMethod"></p-tableCheckbox>
            </td>

            <td class="columns">
              <span class="p-column-title">Nome:</span>
              {{ paymentMethod.name }}
            </td>

            <td class="columns">
              <span class="p-column-title">Taxa:</span>
              {{
                paymentMethod.fee != null
                  ? (paymentMethod.fee | number: "1.2-2") + "%"
                  : "-"
              }}
            </td>

            <td class="col-actions">
              <div class="actions-wrap">
                <a
                  pButton
                  class="p-button-rounded p-button-text"
                  icon="pi pi-pencil"
                  pTooltip="Atualizar forma de pagamento"
                  tooltipPosition="top"
                  [routerLink]="['/payment-methods/', paymentMethod.id, 'edit']"
                ></a>

                <button
                  pButton
                  class="p-button-rounded p-button-text p-button-danger"
                  icon="pi pi-trash"
                  pTooltip="Excluir forma de pagamento"
                  tooltipPosition="top"
                  (click)="delete(paymentMethod)"
                ></button>

                <button
                  pButton
                  class="p-button-rounded p-button-text"
                  icon="pi pi-eye"
                  pTooltip="Detalhamento da forma de pagamento"
                  tooltipPosition="top"
                  (click)="openDetails(paymentMethod)"
                ></button>
              </div>
            </td>
          </tr>
        </ng-template>
      </p-table>

      <app-payment-method-details-modal
        [visible]="detailsVisible"
        (visibleChange)="detailsVisible = $event"
        [title]="'Detalhamento da Forma de Pagamento'"
        [paymentMethod]="paymentMethodDetails"
      ></app-payment-method-details-modal>
    </div>
  </div>
</div>
