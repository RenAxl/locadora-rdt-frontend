<div class="account-page">
  <div class="account-card">
    <div class="account-header"><h1>Reenviar ativação</h1><p>Informe seu e-mail para receber um novo link.</p></div>
    <form #resendForm="ngForm" (ngSubmit)="resend(resendForm)">
      <div class="field"><label>E-mail</label><input pInputText type="email" name="email" [(ngModel)]="email" required email /></div>
      <button type="submit" class="btn btn-primary action-button" [disabled]="resendForm.invalid || loading">{{ loading ? 'ENVIANDO...' : 'Reenviar link' }}</button>
      <a class="back-link" routerLink="/auth/login">Voltar para o login</a>
    </form>
  </div>
</div>
