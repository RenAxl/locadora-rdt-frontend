<div class="item-form-container">
  <div class="item-card">
    <form #itemForm="ngForm" (ngSubmit)="save(itemForm)">
      <div class="col-12 mb-3">
        <h1>Dados do Item</h1>
      </div>

      <div class="row g-3 item-form-inputs">
        <div class="col-12 col-lg-6">
          <label class="form-label-custom">Nome</label>
          <input
            pInputText
            placeholder="Nome"
            type="text"
            name="name"
            [(ngModel)]="item.name"
            #name="ngModel"
            required
            minlength="3"
            maxlength="100"
            class="form-control"
          />

          <app-message
            [control]="name"
            error="required"
            text="Informe o nome do item"
          ></app-message>
        </div>

        <div class="col-12 col-lg-6">
          <label class="form-label-custom">Categoria</label>
          <div class="select-wrapper">
            <select
              name="category"
              [(ngModel)]="item.category"
              [compareWith]="compareById"
              #category="ngModel"
              required
              class="form-control select-arrow"
            >
              <option [ngValue]="undefined">Selecione uma categoria</option>
              <option *ngFor="let category of categories" [ngValue]="category">
                {{ category.name }}
              </option>
            </select>
          </div>

          <app-message
            [control]="category"
            error="required"
            text="Informe a categoria"
          ></app-message>
        </div>

        <div class="col-12 col-lg-6">
          <label class="form-label-custom">Tipo de locação</label>
          <div class="select-wrapper">
            <select
              name="rentalType"
              [(ngModel)]="item.rentalType"
              [compareWith]="compareById"
              #rentalType="ngModel"
              required
              class="form-control select-arrow"
            >
              <option [ngValue]="undefined">
                Selecione um tipo de locação
              </option>
              <option
                *ngFor="let rentalType of rentalTypes"
                [ngValue]="rentalType"
              >
                {{ rentalType.name }}
              </option>
            </select>
          </div>

          <app-message
            [control]="rentalType"
            error="required"
            text="Informe o tipo de locação"
          ></app-message>
        </div>

        <div class="col-12 col-lg-3">
          <label class="form-label-custom">Preço</label>
          <p-inputNumber
            [(ngModel)]="item.price"
            name="price"
            mode="currency"
            currency="BRL"
            locale="pt-BR"
            [minFractionDigits]="2"
            [maxFractionDigits]="2"
            [min]="0.01"
            placeholder="Preço"
            [required]="true"
          ></p-inputNumber>
        </div>

        <div class="col-12 col-lg-3">
          <label class="form-label-custom">Quantidade</label>
          <input
            pInputText
            placeholder="Quantidade"
            type="number"
            name="quantity"
            [(ngModel)]="item.quantity"
            #quantity="ngModel"
            required
            min="0"
            class="form-control"
          />

          <app-message
            [control]="quantity"
            error="required"
            text="Informe a quantidade"
          ></app-message>
        </div>

        <div class="col-12">
          <div class="item-image-section">
            <div class="item-image-area">
              <div class="item-image-frame">
                <ng-container *ngIf="imagePreviewUrl; else noImage">
                  <img
                    class="item-image"
                    [src]="imagePreviewUrl"
                    alt="Imagem do item"
                  />
                </ng-container>

                <ng-template #noImage>
                  <div class="item-image-placeholder" aria-label="Sem imagem">
                    <i class="pi pi-box item-image-icon"></i>
                  </div>
                </ng-template>
              </div>

              <div class="item-image-meta">
                <div class="item-image-title">Imagem do item</div>
                <div class="item-image-subtitle">
                  Adicione uma imagem opcional para identificação. Formatos
                  aceitos: JPG, PNG ou WEBP com até 2MB.
                </div>

                <div class="item-image-actions">
                  <label class="upload-btn" for="image">
                    <i class="pi pi-upload upload-btn-icon"></i>
                    <span>Selecionar imagem</span>
                  </label>

                  <input
                    id="image"
                    type="file"
                    name="image"
                    accept="image/png,image/jpeg,image/webp"
                    (change)="onImageSelected($event)"
                    class="upload-input"
                  />

                  <span class="file-chip" *ngIf="selectedImageName">
                    {{ selectedImageName }}
                  </span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="item-form-buttons mt-4">
        <button
          type="submit"
          [disabled]="itemForm.invalid"
          class="btn btn-primary item-form-button"
        >
          SALVAR
        </button>

        <a routerLink="/rental/items">
          <button type="button" class="btn btn-outline-danger item-form-button">
            CANCELAR
          </button>
        </a>
      </div>
    </form>
  </div>
</div>
