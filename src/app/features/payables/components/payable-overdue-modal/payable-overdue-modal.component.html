<p-dialog
  header="Conta vencida"
  [(visible)]="visible"
  [modal]="true"
  [style]="{ width: '420px', maxWidth: '95vw' }"
  (onHide)="close()"
>
  <div class="overdue-grid" *ngIf="payable; else empty">
    <div class="overdue-line highlight">
      <span>Valor atual</span>
      <strong>{{ getCurrentAmount() | currency: "BRL" }}</strong>
    </div>

    <div class="overdue-line">
      <span>Dias em atraso</span>
      <strong>{{ getOverdueDays() }}</strong>
    </div>

    <div class="overdue-line">
      <span>Juros calculado</span>
      <strong>{{ getCalculatedLateInterest() | currency: "BRL" }}</strong>
    </div>

    <div class="overdue-line">
      <span>Multa calculada</span>
      <strong>{{ getCalculatedLateFee() | currency: "BRL" }}</strong>
    </div>
  </div>

  <ng-template #empty>
    <div class="empty">Nenhuma conta selecionada.</div>
  </ng-template>
</p-dialog>
