<div class="payable-filter-container">
  <div class="payable-actions-group">
    <a routerLink="/payables/create" class="action-link">
      <button class="btn btn-primary text-white btn-crud-action">
        NOVA CONTA
      </button>
    </a>
  </div>
</div>

<app-payable-filters
  (filter)="applyFilters($event)"
  (clear)="clearFilters()"
></app-payable-filters>

<div class="payable-card">
  <div class="empty-state" *ngIf="payables.length === 0">
    Nenhuma conta encontrada.
  </div>

  <div class="payable-list" *ngIf="payables.length > 0">
    <app-payable-card
      *ngFor="let payable of payables"
      [payable]="payable"
      (pay)="pay($event)"
      (installment)="installment($event)"
      (details)="openDetails($event)"
      (overdueDetails)="openOverdueDetails($event)"
      (files)="openFilesModal($event)"
      (delete)="delete($event)"
    ></app-payable-card>
  </div>

  <p-paginator
    [rows]="pagination.linesPerPage"
    [totalRecords]="totalElements"
    [rowsPerPageOptions]="[5, 10, 20]"
    (onPageChange)="changePage($event)"
  ></p-paginator>

  <app-payable-details-modal
    [visible]="detailsVisible"
    (visibleChange)="detailsVisible = $event"
    [payable]="payableDetails"
  ></app-payable-details-modal>

  <app-payable-files-modal
    [visible]="filesVisible"
    (visibleChange)="filesVisible = $event"
    [payableId]="selectedPayableId"
    [payableDescription]="selectedPayableDescription"
  ></app-payable-files-modal>

  <app-payable-overdue-modal
    [visible]="overdueVisible"
    (visibleChange)="overdueVisible = $event"
    [payable]="overduePayable"
  ></app-payable-overdue-modal>

  <app-payable-payment-choice-modal
    [visible]="paymentChoiceVisible"
    (visibleChange)="paymentChoiceVisible = $event"
    (editCharges)="editPaymentCharges()"
    (useDefaultCharges)="useDefaultPaymentCharges()"
  ></app-payable-payment-choice-modal>

  <app-payable-payment-charges-modal
    [visible]="paymentEditChargesVisible"
    (visibleChange)="paymentEditChargesVisible = $event"
    [lateFee]="paymentCharges.lateFee"
    [lateInterest]="paymentCharges.lateInterest"
    (confirmCharges)="finishPaymentChargesEdit($event)"
  ></app-payable-payment-charges-modal>

  <app-payable-payment-modal
    [visible]="paymentModalVisible"
    (visibleChange)="paymentModalVisible = $event"
    [payable]="paymentPayable"
    [lateFee]="paymentCharges.lateFee"
    [lateInterest]="paymentCharges.lateInterest"
    (pay)="submitPayment($event)"
  ></app-payable-payment-modal>
</div>
