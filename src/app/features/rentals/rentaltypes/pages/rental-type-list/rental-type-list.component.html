<div class="rental-type-filter-container">
  <div class="rental-type-actions-group">
    <a routerLink="/rental/rentaltypes/create" class="action-link">
      <button class="btn btn-primary text-white btn-crud-action">
        NOVO TIPO DE LOCAÇÃO
      </button>
    </a>
    <button
      *ngIf="selectedRentalTypeIds.length > 0"
      class="btn btn-danger text-white btn-crud-action"
      type="button"
      (click)="deleteSelectedRentalTypes()"
    >
      EXCLUIR TIPOS
    </button>
  </div>

  <app-name-filter
    text="Digite o nome do tipo de locação"
    (search)="searchRentalType($event)"
  ></app-name-filter>
</div>

<div class="rental-type-card">
  <div class="grid">
    <div class="col-12">
      <p-table
        [value]="rentalTypes"
        dataKey="id"
        (onRowSelect)="onRowSelect($event)"
        (onRowUnselect)="onRowUnselect($event)"
        responsiveLayout="stack"
        breakpoint="991px"
        [paginator]="true"
        [rows]="pagination.linesPerPage"
        [lazy]="true"
        [totalRecords]="totalElements"
        (onLazyLoad)="changePage($event)"
        #rentalTypeTable
      >
        <ng-template pTemplate="header">
          <tr>
            <th></th>
            <th>Nome</th>
            <th>Tipo</th>
            <th>Dias</th>
            <th class="actions"></th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-rentalType>
          <tr [ngClass]="{ 'row-inactive': rentalType?.active === false }">
            <td>
              <p-tableCheckbox [value]="rentalType"></p-tableCheckbox>
            </td>

            <td class="columns">
              <span class="p-column-title">Nome:</span>
              {{ rentalType.name }}
            </td>

            <td class="columns">
              <span class="p-column-title">Tipo:</span>
              {{ rentalType.type }}
            </td>

            <td class="columns">
              <span class="p-column-title">Dias:</span>
              {{ rentalType.days }}
            </td>

            <td class="col-actions">
              <div class="actions-wrap">
                <a
                  pButton
                  class="p-button-rounded p-button-text"
                  icon="pi pi-pencil"
                  pTooltip="Atualizar tipo de locação"
                  tooltipPosition="top"
                  [routerLink]="['/rental/rentaltypes/', rentalType.id, 'edit']"
                ></a>

                <button
                  pButton
                  class="p-button-rounded p-button-text p-button-danger"
                  icon="pi pi-trash"
                  pTooltip="Excluir tipo de locação"
                  tooltipPosition="top"
                  (click)="delete(rentalType)"
                ></button>

                <button
                  pButton
                  class="p-button-rounded p-button-text"
                  icon="pi pi-eye"
                  pTooltip="Detalhamento do tipo de locação"
                  tooltipPosition="top"
                  (click)="openDetails(rentalType)"
                ></button>

                <button
                  pButton
                  class="p-button-rounded p-button-text p-button-warning"
                  [icon]="rentalType.active ? 'pi pi-ban' : 'pi pi-check'"
                  pTooltip="Ativar / Desativar tipo de locação"
                  tooltipPosition="top"
                  (click)="changeActive(rentalType)"
                ></button>
              </div>
            </td>
          </tr>
        </ng-template>
      </p-table>

      <app-rental-type-details-modal
        [visible]="detailsVisible"
        (visibleChange)="detailsVisible = $event"
        [title]="'Detalhamento do Tipo de Locação'"
        [rentalType]="rentalTypeDetails"
      ></app-rental-type-details-modal>
    </div>
  </div>
</div>
