<p-dialog
  header="Detalhamento do Fornecedor"
  [(visible)]="visible"
  [modal]="true"
  [style]="{ width: '720px', maxWidth: '95vw' }"
  (onHide)="close()"
>
  <div class="details-grid" *ngIf="supplier; else loading">
    <div><span>Nome</span><strong>{{ supplier.name || "-" }}</strong></div>
    <div><span>Nome fantasia</span><strong>{{ supplier.tradeName || "-" }}</strong></div>
    <div><span>Razão social</span><strong>{{ supplier.companyName || "-" }}</strong></div>
    <div><span>CNPJ</span><strong>{{ supplier.cnpj || "-" }}</strong></div>
    <div><span>E-mail</span><strong>{{ supplier.email || "-" }}</strong></div>
    <div><span>Telefone</span><strong>{{ supplier.phoneNumber || "-" }}</strong></div>
    <div class="wide"><span>Endereço</span><strong>{{ supplier.address || "-" }}</strong></div>
    <div class="wide photo" *ngIf="imagePreviewUrl">
      <span>Imagem</span>
      <strong><img [src]="imagePreviewUrl" alt="Imagem do fornecedor" /></strong>
    </div>
  </div>

  <ng-template #loading>
    <div class="empty">Carregando...</div>
  </ng-template>
</p-dialog>
